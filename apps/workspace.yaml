# workspace.yaml — multi-unit manifest for the bundled loan-product demo.
# Demo walkthrough: docs/demo/README.md (Part 2). Template: templates/workspace.yaml.
#
# The two webapps are code units. The shared apps/data/ JSON store is NOT a unit —
# its record shapes are declared as contracts below, so contract-check.sh flags the
# consumer unit whenever a provider changes a shared record shape or the webhook protocol.

workspace:
  name: loan-product
  topology: mono-repo        # both units live in this repo, side by side under apps/
  layout: domain

  shared:
    org: {}
    mcp: []
    jira_project: ""

  units:
    - name: loan-webapp
      path: apps/loan-webapp
      stack: [node, typescript, express, ejs, docker]
    - name: lending-webapp
      path: apps/lending-webapp
      stack: [node, typescript, express, ejs, docker]

  run:
    compose: apps/docker-compose.yml   # goal-loop step 8 verifies against this stack

# NOTE: contract `file:` paths are matched against `git diff --name-only` output,
# so they must be repo-root-relative.
contracts:
  - name: loan-record
    file: apps/contracts/loan-record.md
    provider: loan-webapp
    consumers: [lending-webapp]
  - name: notify-webhook
    file: apps/contracts/notify-webhook.md
    provider: lending-webapp
    consumers: [loan-webapp]
